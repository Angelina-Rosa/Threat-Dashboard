# Server
server.port=8080

# PostgreSQL Database
# These values are overridden by Docker Compose environment variables at runtime
spring.datasource.url=jdbc:postgresql://localhost:5432/threatintel
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# update = creates tables on first run, updates schema on changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# AbuseIPDB API Key
abuseipdb.api.key=YOUR_API_KEY_HERE
abuseipdb.api.url=https://api.abuseipdb.com/api/v2/check
