<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Intel Dashboard</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #0f1117; color: #e0e0e0; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card { background-color: #1a1d27; border: 1px solid #2a2d3e; }
        .card-header { background-color: #1e2132; border-bottom: 1px solid #2a2d3e; }
        .table { color: #e0e0e0; }
        .table thead th { color: #8b9bb4; border-color: #2a2d3e; font-size: 0.8rem; text-transform: uppercase; }
        .table td { border-color: #2a2d3e; vertical-align: middle; }
        .badge-high { background-color: #dc3545; }
        .badge-medium { background-color: #fd7e14; }
        .badge-low { background-color: #198754; }
        .score-high { color: #dc3545; font-weight: 700; }
        .score-medium { color: #fd7e14; font-weight: 700; }
        .score-low { color: #198754; font-weight: 700; }
        .result-card { border-left: 4px solid #0d6efd; }
        .result-card.high { border-left-color: #dc3545; }
        .result-card.medium { border-left-color: #fd7e14; }
        .result-card.low { border-left-color: #198754; }
        .form-control { background-color: #1e2132; border-color: #2a2d3e; color: #e0e0e0; }
        .form-control:focus { background-color: #1e2132; border-color: #0d6efd; color: #e0e0e0; box-shadow: 0 0 0 0.2rem rgba(13,110,253,.25); }
        .stat-number { font-size: 2rem; font-weight: 700; color: #0d6efd; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <span class="navbar-brand">
        <i class="bi bi-shield-fill-exclamation text-danger me-2"></i>
        Threat Intel Dashboard
    </span>
    <span class="text-muted small">Powered by AbuseIPDB</span>
</nav>

<div class="container-fluid px-4">

    <!-- IP Lookup Form -->
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-search me-2"></i>IP Reputation Check</h5>
                </div>
                <div class="card-body">
                    <form method="post" action="/lookup">
                        <div class="input-group">
                            <input type="text"
                                   class="form-control form-control-lg"
                                   name="ipAddress"
                                   placeholder="Enter IP address (e.g. 118.25.6.39)"
                                   required>
                            <button class="btn btn-primary btn-lg" type="submit">
                                <i class="bi bi-shield-check me-1"></i> Check IP
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Quick Stat -->
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body d-flex flex-column justify-content-center text-center">
                    <div class="stat-number" th:text="${totalChecked}">0</div>
                    <div class="text-muted">IPs Checked (Recent)</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Result Card -->
    <div th:if="${result}" class="row mb-4">
        <div class="col-12">
            <div class="card result-card"
                 th:classappend="${riskLevel == 'HIGH'} ? 'high' : (${riskLevel == 'MEDIUM'} ? 'medium' : 'low')">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="bi bi-clipboard-data me-2"></i>
                        Result: <span th:text="${result.ipAddress}" class="text-white"></span>
                    </h5>
                    <!-- Risk badge -->
                    <span class="badge fs-6"
                          th:classappend="${riskLevel == 'HIGH'} ? 'badge-high' : (${riskLevel == 'MEDIUM'} ? 'badge-medium' : 'badge-low')"
                          th:text="${riskLevel} + ' RISK'">
                    </span>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-2 text-center">
                            <div class="small text-muted mb-1">Abuse Score</div>
                            <div class="fs-2 fw-bold"
                                 th:classappend="${riskLevel == 'HIGH'} ? 'score-high' : (${riskLevel == 'MEDIUM'} ? 'score-medium' : 'score-low')"
                                 th:text="${result.abuseConfidenceScore} + '%'">
                            </div>
                        </div>
                        <div class="col-md-2 text-center">
                            <div class="small text-muted mb-1">Country</div>
                            <div class="fs-5" th:text="${result.countryCode ?: 'N/A'}"></div>
                        </div>
                        <div class="col-md-3 text-center">
                            <div class="small text-muted mb-1">ISP</div>
                            <div th:text="${result.isp ?: 'N/A'}"></div>
                        </div>
                        <div class="col-md-3 text-center">
                            <div class="small text-muted mb-1">Domain</div>
                            <div th:text="${result.domain ?: 'N/A'}"></div>
                        </div>
                        <div class="col-md-2 text-center">
                            <div class="small text-muted mb-1">Total Reports</div>
                            <div class="fs-5" th:text="${result.totalReports}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Lookups Table -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Recent Lookups</h5>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(recentLookups)}" class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-1"></i>
                        <p class="mt-2">No lookups yet. Enter an IP address above to get started.</p>
                    </div>
                    <table th:unless="${#lists.isEmpty(recentLookups)}" class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>IP Address</th>
                                <th>Abuse Score</th>
                                <th>Risk</th>
                                <th>Country</th>
                                <th>ISP</th>
                                <th>Reports</th>
                                <th>Checked At</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="lookup : ${recentLookups}">
                                <td class="fw-mono" th:text="${lookup.ipAddress}"></td>
                                <td>
                                    <span th:classappend="${lookup.abuseConfidenceScore >= 75} ? 'score-high' : (${lookup.abuseConfidenceScore >= 25} ? 'score-medium' : 'score-low')"
                                          th:text="${lookup.abuseConfidenceScore} + '%'">
                                    </span>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${lookup.abuseConfidenceScore >= 75} ? 'badge-high' : (${lookup.abuseConfidenceScore >= 25} ? 'badge-medium' : 'badge-low')"
                                          th:text="${lookup.abuseConfidenceScore >= 75} ? 'HIGH' : (${lookup.abuseConfidenceScore >= 25} ? 'MEDIUM' : 'LOW')">
                                    </span>
                                </td>
                                <td th:text="${lookup.countryCode ?: 'N/A'}"></td>
                                <td th:text="${lookup.isp ?: 'N/A'}"></td>
                                <td th:text="${lookup.totalReports}"></td>
                                <td class="text-muted small" th:text="${#temporals.format(lookup.lookedUpAt, 'MM/dd/yyyy HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/history/{ip}(ip=${lookup.ipAddress})}"
                                       class="btn btn-sm btn-outline-secondary">
                                        History
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
